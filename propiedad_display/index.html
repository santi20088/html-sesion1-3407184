<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .titulo {
            color: royalblue;
            font-size: 100px;
            text-align: center;
        }
        .menu {
            display:inline  ;
            color: white;
            background-color: black;
            width: 1000px;
            height: 1000px;

        }
        .menu_block{
            display: block;
            color: yellow;
            background-color: lightslategray;
            width: 400px;
            height: 200px;
            border: 1px solid black;

        }


    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 class="titulo">elementos inline </h1>
    <div class="menu">productos</div>
    <div class="menu">servicos</div>
    <div class="menu">contacto</div>
    <hr>
    <h1>Elementos block</h1>
     <div class="menu_block">productos</div>
    <div class="menu_block">servicos</div>
    <div class="menu_block">contacto</div>
    

</body>
</html>
